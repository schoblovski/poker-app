name: Deploy Supabase Edge Functions

on:
  push:
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy poker-start-game
        continue-on-error: true
        run: supabase functions deploy poker-start-game --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy poker-action
        continue-on-error: true
        run: supabase functions deploy poker-action --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy poker-next-street
        continue-on-error: true
        run: supabase functions deploy poker-next-street --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy poker-showdown
        continue-on-error: true
        run: supabase functions deploy poker-showdown --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy poker-new-hand
        continue-on-error: true
        run: supabase functions deploy poker-new-hand --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy poker-reveal-runout
        continue-on-error: true
        run: supabase functions deploy poker-reveal-runout --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy poker-bot-action
        continue-on-error: true
        run: supabase functions deploy poker-bot-action --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy poker-bot-cron
        continue-on-error: true
        run: supabase functions deploy poker-bot-cron --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy send-push
        continue-on-error: true
        run: supabase functions deploy send-push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy weekly-backup
        continue-on-error: true
        run: supabase functions deploy weekly-backup --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt

      - name: Deploy poker-delete-session
        continue-on-error: true
        run: supabase functions deploy poker-delete-session --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-verify-jwt
