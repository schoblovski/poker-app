<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="version" content="1.3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d0f" id="theme-color-meta">
  <title>DTKS Poker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --radius-sm:8px;--radius-md:14px;--radius-lg:20px;--radius-xl:28px;
      --space-xs:4px;--space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px;
      --font-sans:'DM Sans',-apple-system,sans-serif;--font-mono:'DM Mono',monospace;
      --transition:180ms ease;
      --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);
    }
    [data-theme="light"]{
      --bg:#f2f2f7;--bg-elevated:#fff;--bg-secondary:#e8e8ed;--bg-tertiary:#d8d8de;
      --surface:#fff;--border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.15);
      --text-primary:#1c1c1e;--text-secondary:#6c6c70;--text-tertiary:#aeaeb2;
      --accent:#16a34a;--accent-soft:#dcfce7;--accent-text:#15803d;
      --danger:#dc2626;--danger-soft:#fee2e2;--warning:#d97706;--warning-soft:#fef3c7;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);--shadow-lg:0 8px 30px rgba(0,0,0,.12);
      --nav-bg:rgba(242,242,247,.88);--header-bg:rgba(242,242,247,.88);
      --theme-color:#f2f2f7;
    }
    [data-theme="dark"]{
      --bg:#0d0d0f;--bg-elevated:#1c1c1e;--bg-secondary:#2c2c2e;--bg-tertiary:#3a3a3c;
      --surface:#1c1c1e;--border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.15);
      --text-primary:#f5f5f7;--text-secondary:#98989f;--text-tertiary:#636366;
      --accent:#22c55e;--accent-soft:#052e16;--accent-text:#4ade80;
      --danger:#f87171;--danger-soft:#2d0a0a;--warning:#fbbf24;--warning-soft:#2d1f00;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);--shadow-lg:0 8px 30px rgba(0,0,0,.5);
      --nav-bg:rgba(13,13,15,.88);--header-bg:rgba(13,13,15,.88);
      --theme-color:#0d0d0f;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{height:100%;}
    body{font-family:var(--font-sans);background:var(--bg);color:var(--text-primary);min-height:100dvh;display:flex;flex-direction:column;transition:background var(--transition),color var(--transition);-webkit-font-smoothing:antialiased;}

    /* ── LOGIN ─────────────────────────────────────────── */
    #login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--safe-top) + 40px) var(--space-xl) calc(var(--safe-bottom) + 40px);position:relative;overflow:hidden;}
    .login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%, rgba(34,197,94,.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(34,197,94,.08) 0%, transparent 50%);pointer-events:none;}
    .login-card{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:var(--space-md);width:100%;max-width:320px;}
    .login-suit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:var(--space-sm);}
    .login-suit{width:56px;height:56px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;}
    .suit-spade{background:#1c1c1e;color:#f5f5f7;}
    .suit-heart{background:#fee2e2;color:#dc2626;}
    .suit-diamond{background:#fee2e2;color:#dc2626;}
    .suit-club{background:#1c1c1e;color:#f5f5f7;}
    [data-theme="light"] .suit-spade{background:#1c1c1e;color:#f5f5f7;}
    [data-theme="light"] .suit-club{background:#1c1c1e;color:#f5f5f7;}
    .login-title{font-size:28px;font-weight:700;letter-spacing:-.5px;text-align:center;}
    .login-subtitle{font-size:13px;color:var(--text-secondary);letter-spacing:.3px;text-transform:uppercase;font-weight:500;text-align:center;}
    .login-divider{display:flex;align-items:center;gap:var(--space-sm);width:100%;margin:var(--space-xs) 0;}
    .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border-strong);}
    .login-divider span{font-size:11px;color:var(--text-tertiary);font-weight:500;}
    .btn-oauth{display:flex;align-items:center;gap:10px;background:var(--surface);color:var(--text-primary);border:1px solid var(--border-strong);border-radius:var(--radius-md);padding:13px var(--space-md);font-size:14px;font-weight:500;cursor:pointer;width:100%;justify-content:center;box-shadow:var(--shadow);transition:all var(--transition);font-family:var(--font-sans);}
    .btn-oauth:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg);}
    .btn-oauth:active{transform:scale(.98);}
    .btn-oauth svg{width:20px;height:20px;flex-shrink:0;}

    /* ── APP ───────────────────────────────────────────── */
    #app-screen{display:none;flex-direction:column;flex:1;max-width:430px;margin:0 auto;width:100%;position:relative;}
    .header{padding:calc(var(--safe-top) + 12px) calc(var(--safe-right) + var(--space-md)) 12px calc(var(--safe-left) + var(--space-md));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .header-left{display:flex;flex-direction:column;}
    .header-app-name{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;}
    .header-page-title{font-size:17px;font-weight:700;color:var(--text-primary);letter-spacing:-.3px;line-height:1.2;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .sync-badge{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:20px;font-size:11px;font-weight:600;transition:all var(--transition);}
    .sync-badge.synced{background:var(--accent-soft);color:var(--accent-text);}
    .sync-badge.pending{background:var(--warning-soft);color:var(--warning);}
    .sync-badge.error{background:var(--danger-soft);color:var(--danger);}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
    .sync-dot.spin{animation:spin .8s linear infinite;}
    .avatar-btn{width:34px;height:34px;border-radius:50%;background:var(--bg-secondary);border:none;cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .avatar-btn img{width:100%;height:100%;object-fit:cover;}
    .avatar-btn svg{width:18px;height:18px;color:var(--text-secondary);}
    .content{flex:1;overflow-y:auto;padding:var(--space-md);padding-left:calc(var(--safe-left) + var(--space-md));padding-right:calc(var(--safe-right) + var(--space-md));padding-bottom:calc(var(--safe-bottom) + 80px);}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:50;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px 8px;border:none;background:none;cursor:pointer;color:var(--text-tertiary);transition:color var(--transition);}
    .nav-btn.active{color:var(--accent);}
    .nav-btn svg{width:22px;height:22px;stroke-width:1.8;}
    .nav-btn.active svg{stroke-width:2.2;}
    .nav-label{font-size:10px;font-weight:500;letter-spacing:.2px;}

    /* ── COMPONENTS ────────────────────────────────────── */
    .section-title{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.7px;margin:var(--space-lg) 0 var(--space-sm);}
    .section-title:first-child{margin-top:0;}
    .card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;}
    .card+.card{margin-top:var(--space-sm);}
    .list-item{display:flex;align-items:center;gap:var(--space-md);padding:14px var(--space-md);border-bottom:1px solid var(--border);transition:background var(--transition);}
    .list-item:last-child{border-bottom:none;}
    .list-item.clickable{cursor:pointer;}
    .list-item.clickable:active{background:var(--bg-secondary);}
    .item-avatar{width:44px;height:44px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
    .item-avatar img{width:100%;height:100%;object-fit:cover;}
    .item-avatar svg{width:22px;height:22px;color:var(--text-tertiary);}
    .item-avatar.accent{background:var(--accent-soft);}
    .item-avatar.accent svg{color:var(--accent);}
    .item-avatar.warn{background:var(--warning-soft);}
    .item-avatar.warn svg{color:var(--warning);}
    .item-avatar.danger{background:var(--danger-soft);}
    .item-avatar.danger svg{color:var(--danger);}
    .item-body{flex:1;min-width:0;}
    .item-title{font-size:15px;font-weight:500;color:var(--text-primary);}
    .item-subtitle{font-size:12px;color:var(--text-secondary);margin-top:2px;}
    .item-trailing{display:flex;align-items:center;gap:var(--space-sm);flex-shrink:0;}
    .item-amount{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
    .amount-pos{color:var(--accent-text);}
    .amount-neg{color:var(--danger);}
    .amount-zero{color:var(--text-tertiary);}
    .chevron svg{width:16px;height:16px;color:var(--text-tertiary);}
    .btn{display:flex;align-items:center;justify-content:center;gap:var(--space-sm);border:none;border-radius:var(--radius-md);padding:14px var(--space-lg);font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:all var(--transition);font-family:var(--font-sans);}
    .btn svg{width:18px;height:18px;}
    .btn:active{transform:scale(.98);}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-secondary{background:var(--bg-secondary);color:var(--text-primary);}
    .btn-danger{background:var(--danger-soft);color:var(--danger);}
    .btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-strong);}
    .btn+.btn{margin-top:var(--space-sm);}
    .counter-row{display:flex;align-items:center;gap:var(--space-md);padding:14px var(--space-md);border-bottom:1px solid var(--border);}
    .counter-row:last-child{border-bottom:none;}
    .counter-info{flex:1;}
    .counter-name{font-size:15px;font-weight:500;}
    .counter-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
    .counter-controls{display:flex;align-items:center;gap:var(--space-sm);}
    .counter-btn{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);}
    .counter-btn svg{width:16px;height:16px;}
    .counter-btn.minus{background:var(--danger-soft);color:var(--danger);}
    .counter-btn.plus{background:var(--accent-soft);color:var(--accent-text);}
    .counter-btn:active{transform:scale(.88);}
    .counter-value{font-size:18px;font-weight:700;min-width:28px;text-align:center;font-variant-numeric:tabular-nums;}
    .form-group{margin-bottom:var(--space-md);}
    .form-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px;}
    .form-input{width:100%;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px var(--space-md);color:var(--text-primary);font-size:15px;font-family:var(--font-sans);transition:border-color var(--transition),box-shadow var(--transition);}
    .form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,197,94,.15);}
    .form-input::placeholder{color:var(--text-tertiary);}
    .payout-input-row{display:flex;align-items:center;gap:var(--space-sm);padding:10px var(--space-md);border-bottom:1px solid var(--border);}
    .payout-input-row:last-child{border-bottom:none;}
    .payout-field{flex:1;background:transparent;border:none;color:var(--text-primary);font-size:15px;font-weight:500;font-family:var(--font-mono);text-align:right;padding:4px 0;}
    .payout-field:focus{outline:none;}
    .payout-unit{font-size:13px;color:var(--text-tertiary);}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm);margin-bottom:var(--space-sm);}
    .stat-card{background:var(--surface);border-radius:var(--radius-lg);padding:var(--space-md);box-shadow:var(--shadow);}
    .stat-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;}
    .stat-value{font-size:22px;font-weight:700;margin-top:6px;letter-spacing:-.5px;font-variant-numeric:tabular-nums;}
    .stat-value.sm{font-size:17px;}
    .stat-sub{font-size:12px;color:var(--text-secondary);margin-top:3px;}
    .stat-card.wide{grid-column:1/-1;}
    .stat-card.accent{background:var(--accent-soft);}
    .stat-card.accent .stat-label{color:var(--accent-text);opacity:.8;}
    .stat-card.accent .stat-value{color:var(--accent-text);}
    .profile-header{text-align:center;padding:var(--space-lg) 0 var(--space-md);}
    .profile-avatar-lg{width:80px;height:80px;border-radius:50%;background:var(--bg-secondary);overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-md);}
    .profile-avatar-lg img{width:100%;height:100%;object-fit:cover;}
    .profile-avatar-lg svg{width:40px;height:40px;color:var(--text-tertiary);}
    .profile-name{font-size:22px;font-weight:700;letter-spacing:-.3px;}
    .profile-since{font-size:13px;color:var(--text-secondary);margin-top:4px;}
    .timeline-item{display:flex;gap:var(--space-md);padding:12px var(--space-md);border-bottom:1px solid var(--border);}
    .timeline-item:last-child{border-bottom:none;}
    .timeline-date{font-size:12px;color:var(--text-secondary);width:60px;flex-shrink:0;padding-top:2px;}
    .timeline-body{flex:1;}
    .timeline-title{font-size:14px;font-weight:500;}
    .timeline-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
    .timeline-amount{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0;padding-top:2px;}
    .select-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm);margin-top:var(--space-sm);}
    .select-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-md);padding:var(--space-md);display:flex;flex-direction:column;align-items:center;gap:var(--space-sm);cursor:pointer;transition:all var(--transition);text-align:center;}
    .select-card.selected{border-color:var(--accent);background:var(--accent-soft);}
    .select-card-name{font-size:14px;font-weight:500;}
    .dropdown{position:fixed;top:calc(var(--safe-top) + 58px);right:calc(var(--safe-right) + var(--space-md));background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-xs);z-index:200;display:none;box-shadow:var(--shadow-lg);min-width:200px;}
    .dropdown.open{display:block;animation:fadeIn 120ms ease;}
    .dropdown-item{display:flex;align-items:center;gap:var(--space-sm);padding:11px var(--space-md);border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;color:var(--text-primary);transition:background var(--transition);border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans);}
    .dropdown-item:hover{background:var(--bg-secondary);}
    .dropdown-item svg{width:16px;height:16px;color:var(--text-secondary);}
    .dropdown-item.danger{color:var(--danger);}
    .dropdown-item.danger svg{color:var(--danger);}
    .dropdown-divider{height:1px;background:var(--border);margin:var(--space-xs) 0;}
    .theme-picker{display:flex;gap:var(--space-xs);padding:var(--space-xs) var(--space-md) var(--space-sm);}
    .theme-btn{flex:1;padding:7px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;background:var(--bg-secondary);color:var(--text-secondary);font-family:var(--font-sans);transition:all var(--transition);}
    .theme-btn.active{background:var(--accent-soft);color:var(--accent-text);border-color:var(--accent);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
    .modal-overlay.open{display:flex;animation:fadeIn 150ms ease;}
    .modal{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:var(--space-lg) var(--space-lg) calc(var(--safe-bottom) + var(--space-lg));width:100%;max-width:430px;max-height:92vh;overflow-y:auto;}
    .modal-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto var(--space-lg);}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:var(--space-lg);letter-spacing:-.3px;}
    .modal-actions{display:flex;gap:var(--space-sm);margin-top:var(--space-lg);}
    .modal-actions .btn{flex:1;}
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
    .badge-green{background:var(--accent-soft);color:var(--accent-text);}
    .badge-red{background:var(--danger-soft);color:var(--danger);}
    .kommentar-chip{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-primary);font-family:var(--font-sans);text-align:left;transition:all var(--transition);width:100%;}
    .kommentar-chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-text);}
    .page{display:none;}.page.active{display:block;}
    .back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--accent-text);font-size:15px;font-weight:500;padding:0;font-family:var(--font-sans);margin-bottom:var(--space-lg);}
    .back-btn svg{width:20px;height:20px;}
    .loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text-tertiary);gap:var(--space-sm);font-size:14px;}
    .spinner{width:20px;height:20px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
    .empty{text-align:center;padding:48px var(--space-md);}
    .empty-icon{width:56px;height:56px;border-radius:var(--radius-xl);background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-md);}
    .empty-icon svg{width:28px;height:28px;color:var(--text-tertiary);}
    .empty-title{font-size:17px;font-weight:600;margin-bottom:6px;}
    .empty-subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:var(--space-lg);}
    .pot-summary{background:var(--accent-soft);border-radius:var(--radius-md);padding:10px var(--space-md);display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:var(--space-sm);}
    .pot-summary-label{color:var(--accent-text);font-weight:500;}
    .pot-summary-value{color:var(--accent-text);font-weight:700;font-variant-numeric:tabular-nums;}
    .pot-summary-value.warn{color:var(--warning);}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-suit-grid">
      <div class="login-suit suit-spade">♠</div>
      <div class="login-suit suit-heart">♥</div>
      <div class="login-suit suit-diamond">♦</div>
      <div class="login-suit suit-club">♣</div>
    </div>
    <div class="login-title">DTKS Poker</div>
    <div class="login-subtitle">Private Pokerrunde</div>
    <div class="login-divider"><span>Anmelden mit</span></div>
    <button class="btn-oauth" id="btn-login-google">

  function applyTheme(p){

    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===p));

    const color=d?'#0d0d0f':'#f2f2f7';

    // Force iOS to re-read theme-color
    const meta=document.getElementById('theme-color-meta');
    meta.setAttribute('content','');
    requestAnimationFrame(()=>meta.setAttribute('content',color));
  }
  function setTheme(p){localStorage.setItem('dtks-theme',p);applyTheme(p);}

  // ── HOME ───────────────────────────────────────────────
  async function loadHome(){
    const el=document.getElementById('home-content');
    // Kontostand dynamisch aus Transaktionen berechnen
    const{data:spieler}=await db.from('spieler').select('*').eq('aktiv',true).order('name');
    if(!spieler)return;
    alleSpieler=spieler;

    // Transaktionen laden für Kontostand-Berechnung
    const{data:trans}=await db.from('transaktionen').select('*');
    const kontostaende={};
    spieler.forEach(s=>{kontostaende[s.id]=0;});
    (trans||[]).forEach(t=>{
      if(t.nach_spieler_id&&kontostaende[t.nach_spieler_id]!==undefined)kontostaende[t.nach_spieler_id]+=t.betrag;
      if(t.von_spieler_id&&kontostaende[t.von_spieler_id]!==undefined)kontostaende[t.von_spieler_id]-=t.betrag;
    });

    const ich=spieler.find(s=>s.id===currentSpieler?.id);
    const bank=spieler.find(s=>s.ist_bank);
    const rest=spieler.filter(s=>s.id!==currentSpieler?.id&&!s.ist_bank);
    let html='';

    if(ich){

  // ── SPIELER STATS ──────────────────────────────────────
  async function showSpielerStats(spieler){
    const el=document.getElementById('spieler-stats-content');
    el.innerHTML=`<div class="loading"><div class="spinner"></div>Lade…</div>`;
    showPage('spieler-stats');
    const[{data:verlauf},{data:haende},{data:transOut},{data:transIn}]=await Promise.all([
      db.from('spiel_teilnehmer').select('*,spiele(datum,abgeschlossen)').eq('spieler_id',spieler.id).eq('in_statistik',true).order('created_at',{ascending:false}),
      db.from('hand_statistik').select('*').eq('gewinner_id',spieler.id),
      db.from('transaktionen').select('*').eq('von_spieler_id',spieler.id).order('datum',{ascending:false}),
      db.from('transaktionen').select('*').eq('nach_spieler_id',spieler.id).order('datum',{ascending:false}),
    ]);
    const abg=(verlauf||[]).filter(t=>t.spiele?.abgeschlossen);
    const n=abg.length,gBuyins=abg.reduce((s,t)=>s+t.buyins,0),gPayout=abg.reduce((s,t)=>s+t.payout,0);
    const reingewinne=abg.map(t=>t.payout-(t.buyins*7)-(t.leihgabe||0));
    const gRein=reingewinne.reduce((s,v)=>s+v,0),avgRein=n>0?gRein/n:0;
    const maxRein=reingewinne.length>0?Math.max(...reingewinne):0,minRein=reingewinne.length>0?Math.min(...reingewinne):0;
    const avgBuyins=n>0?gBuyins/n:0,maxBuyins=abg.length>0?Math.max(...abg.map(t=>t.buyins)):0;
    const ks=spieler.kontostand||0;
    const seit=spieler.eintrittsdatum?new Date(spieler.eintrittsdatum).getFullYear():'–';
    let html=`<button class="back-btn" id="stats-back">${backIcon} Zurück</button>
      <div class="profile-header">${spieler.profilbild?`<div class="profile-avatar-lg"><img src="${spieler.profilbild}" alt="${spieler.name}"></div>`:`<div class="profile-avatar-lg">${userIcon}</div>`}
        <div class="profile-name">${spieler.name}</div><div class="profile-since">Dabei seit ${seit} · ${n} Spiele</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card accent wide"><div class="stat-label">Kontostand</div><div class="stat-value ${ksClass(ks)}">${fmt(ks)}</div></div>
        <div class="stat-card accent wide"><div class="stat-label">Reingewinn gesamt</div><div class="stat-value ${ksClass(gRein)}">${fmtSigned(gRein)}</div><div class="stat-sub">Ø ${fmtSigned(avgRein)} pro Abend</div></div>
        <div class="stat-card"><div class="stat-label">Bestes Ergebnis</div><div class="stat-value sm amount-pos">+€${maxRein.toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Schlechtestes</div><div class="stat-value sm amount-neg">−€${Math.abs(minRein).toFixed(2)}</div></div>
        <div class="stat-card"><div class="stat-label">Buy-Ins gesamt</div><div class="stat-value sm">${gBuyins}</div><div class="stat-sub">Ø ${avgBuyins.toFixed(1)} · Max ${maxBuyins}</div></div>
        <div class="stat-card"><div class="stat-label">Ausgespielt</div><div class="stat-value sm">€${gPayout.toFixed(0)}</div></div>
        <div class="stat-card"><div class="stat-label">Besondere Hände</div><div class="stat-value sm">${(haende||[]).length}</div></div>
        <div class="stat-card"><div class="stat-label">7-2 Gewinne</div><div class="stat-value sm">${(haende||[]).filter(h=>h.hand==='7-2').length}</div></div>
      </div>`;
    const letzteSpiele=abg.slice(0,10);
    if(letzteSpiele.length>0){
      html+=`<div class="section-title">Letzte Spiele</div><div class="card">`;
      letzteSpiele.forEach((t,i)=>{const rein=reingewinne[i];const d=new Date(t.spiele.datum).toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});html+=`<div class="timeline-item"><div class="timeline-date">${d}</div><div class="timeline-body"><div class="timeline-title">${t.buyins}× Buy-In · €${t.payout.toFixed(2)} PayOut</div></div><div class="timeline-amount ${ksClass(rein)}">${fmtSigned(rein)}</div></div>`;});
      html+=`</div>`;
    }
    const alleTrans=[...(transIn||[]).map(t=>({...t,dir:'in'})),...(transOut||[]).map(t=>({...t,dir:'out'}))].sort((a,b)=>new Date(b.datum)-new Date(a.datum)).slice(0,8);
    if(alleTrans.length>0){
      html+=`<div class="section-title">Letzte Kontobewegungen</div><div class="card">`;
      alleTrans.forEach(t=>{const d=new Date(t.datum).toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});const sign=t.dir==='in'?'+':'-';const cls=t.dir==='in'?'amount-pos':'amount-neg';html+=`<div class="timeline-item"><div class="timeline-date">${d}</div><div class="timeline-body"><div class="timeline-title">${t.kommentar||'Transaktion'}</div></div><div class="timeline-amount ${cls}">${sign}€${t.betrag.toFixed(2)}</div></div>`;});
      html+=`</div>`;
    }
    el.innerHTML=html;
    document.getElementById('stats-back').addEventListener('click',()=>showPage('home'));
  }

  function openTransaktionModal(t){
    editTransaktionID=t?.id||null;
    document.getElementById('trans-modal-title').textContent=t?'Transaktion bearbeiten':'Neue Transaktion';
    document.getElementById('trans-datum').value=t?.datum||new Date().toISOString().split('T')[0];
    document.getElementById('trans-betrag').value=t?.betrag||'';

    const spielerOpts=alleSpieler.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
    document.getElementById('trans-von').innerHTML=`<option value="">– leer –</option>${spielerOpts}`;
    document.getElementById('trans-nach').innerHTML=`<option value="">– leer –</option>${spielerOpts}`;
    if(t?.von_spieler_id)document.getElementById('trans-von').value=t.von_spieler_id;
    if(t?.nach_spieler_id)document.getElementById('trans-nach').value=t.nach_spieler_id;

    let selectedKommentar=t?.kommentar&&KOMMENTAR_VORLAGEN.includes(t.kommentar)?t.kommentar:'';
    const chipsEl=document.getElementById('kommentar-chips');
    chipsEl.innerHTML=KOMMENTAR_VORLAGEN.map(k=>`<button class="kommentar-chip${k===selectedKommentar?' active':''}" data-val="${k}">${k}</button>`).join('');
    document.getElementById('trans-kommentar-text').value=selectedKommentar?'':(t?.kommentar||'');
    chipsEl.querySelectorAll('.kommentar-chip').forEach(chip=>{
      chip.addEventListener('click',()=>{
        chipsEl.querySelectorAll('.kommentar-chip').forEach(c=>c.classList.remove('active'));
        if(selectedKommentar===chip.dataset.val){selectedKommentar='';}
        else{selectedKommentar=chip.dataset.val;chip.classList.add('active');document.getElementById('trans-kommentar-text').value='';}
      });
    });
    document.getElementById('trans-kommentar-text').addEventListener('input',()=>{selectedKommentar='';chipsEl.querySelectorAll('.kommentar-chip').forEach(c=>c.classList.remove('active'));});
    document.getElementById('modal-transaktion')._getKommentar=()=>selectedKommentar||document.getElementById('trans-kommentar-text').value.trim();

    // Löschen-Button nur beim Bearbeiten
    const existingDel=document.getElementById('trans-loeschen');
    if(existingDel)existingDel.remove();
    if(t){
      const delBtn=document.createElement('button');
      delBtn.id='trans-loeschen';
      delBtn.className='btn btn-danger';
      delBtn.style.marginTop='var(--space-sm)';
      delBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>Transaktion löschen`;
      delBtn.addEventListener('click',async()=>{
        if(!confirmDelete(`Transaktion "${t.kommentar}" über €${t.betrag.toFixed(2)} löschen?`))return;
        await save(()=>db.from('transaktionen').delete().eq('id',t.id),`Transaktion gelöscht`);
        document.getElementById('modal-transaktion').classList.remove('open');
        await loadTransaktionen();await loadHome();
      });
      document.getElementById('modal-transaktion').querySelector('.modal-actions').before(delBtn);
    }
    document.getElementById('modal-transaktion').classList.add('open');
  }

  document.getElementById('trans-abbrechen').addEventListener('click',()=>document.getElementById('modal-transaktion').classList.remove('open'));
  document.getElementById('trans-speichern').addEventListener('click',async()=>{
    const datum=document.getElementById('trans-datum').value;
    const von=document.getElementById('trans-von').value||null;
    const nach=document.getElementById('trans-nach').value||null;
    const betrag=parseFloat(document.getElementById('trans-betrag').value)||0;
    const kommentar=document.getElementById('modal-transaktion')._getKommentar();
    if(!nach&&!von){alert('Bitte Von oder Nach auswählen.');return;}
    if(betrag<=0){alert('Bitte einen Betrag eingeben.');return;}
    if(!kommentar){alert('Bitte einen Kommentar wählen oder eingeben.');return;}
    const data={datum,von_spieler_id:von,nach_spieler_id:nach,betrag,kommentar};
    if(editTransaktionID){await save(()=>db.from('transaktionen').update(data).eq('id',editTransaktionID),`Transaktion aktualisiert`);}
    else{await save(()=>db.from('transaktionen').insert(data),`Transaktion: ${kommentar} €${betrag}`);}
    document.getElementById('modal-transaktion').classList.remove('open');
    await loadTransaktionen();await loadHome();
  });

  // ── AKTUELLES SPIEL ────────────────────────────────────
  async function loadSpiel(){
    const el=document.getElementById('spiel-content');
    el.innerHTML=`<div class="loading"><div class="spinner"></div>Wird geladen…</div>`;
    const{data:spiele}=await db.from('spiele').select('*').eq('abgeschlossen',false).order('created_at',{ascending:false}).limit(1);
    aktuellesSpiel=spiele?.[0]||null;
    if(!aktuellesSpiel){
      el.innerHTML=`<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3l-4 4-4-4"/></svg></div><div class="empty-title">Kein aktives Spiel</div><div class="empty-subtitle">Starte einen neuen Spielabend.</div><button class="btn btn-primary" id="btn-neues-spiel">Neues Spiel starten</button></div>`;
      document.getElementById('btn-neues-spiel').addEventListener('click',zeigeSpielAuswahl);
      return;
    }
    const{data:teilnehmer}=await db.from('spiel_teilnehmer').select('*,spieler(*)').eq('spiel_id',aktuellesSpiel.id);
    spielTeilnehmer=teilnehmer||[];
    renderSpiel();
  }

  function calcPotRest(){
    const gesamtPot=spielTeilnehmer.reduce((s,t)=>s+t.buyins*5,0);
    let zugeordnet=0;
    spielTeilnehmer.forEach(t=>{const v=parseFloat(document.getElementById('payout-'+t.id)?.value)||0;zugeordnet+=v;});
    return{gesamtPot,zugeordnet,rest:gesamtPot-zugeordnet};
  }

  function updatePotSummary(){
    const{gesamtPot,zugeordnet,rest}=calcPotRest();
    const el=document.getElementById('pot-rest-summary');
    if(!el)return;
    el.querySelector('.pot-summary-label').textContent=`Pot: €${gesamtPot.toFixed(0)} · Zugeordnet: €${zugeordnet.toFixed(0)}`;
    const valEl=el.querySelector('.pot-summary-value');
    valEl.textContent=`Rest: €${rest.toFixed(2)}`;
    valEl.className='pot-summary-value'+(Math.abs(rest)>0.01?' warn':'');
  }

  function updateGesamtPot(){
    const gesamtPot=spielTeilnehmer.reduce((s,t)=>s+t.buyins*5,0);
    const el=document.getElementById('gesamt-pot-display');
    if(el)el.textContent=`€${gesamtPot}`;
  }

  function renderSpiel(){
    const el=document.getElementById('spiel-content');
    const datum=new Date(aktuellesSpiel.datum).toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric'});
    const gesamtPot=spielTeilnehmer.reduce((s,t)=>s+t.buyins*5,0);
    let html=`<div class="card" style="margin-bottom:var(--space-md)">
      <div style="display:flex;gap:var(--space-sm);padding:var(--space-md)">
        <div style="flex:1;text-align:center"><div class="stat-label">Datum</div><div style="font-size:17px;font-weight:700;margin-top:4px">${datum}</div></div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="flex:1;text-align:center"><div class="stat-label">Spieler</div><div style="font-size:17px;font-weight:700;margin-top:4px">${spielTeilnehmer.length}</div></div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="flex:1;text-align:center"><div class="stat-label">Pot</div><div id="gesamt-pot-display" style="font-size:17px;font-weight:700;margin-top:4px;color:var(--accent-text)">€${gesamtPot}</div></div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="section-title" style="margin:0">Buy-Ins</div>
      <button class="btn btn-ghost" id="btn-edit-teilnehmer" style="width:auto;padding:8px 14px;font-size:13px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/><line x1="16" y1="14" x2="22" y2="14"/></svg>
        Teilnehmer
      </button>
    </div>
    <div class="card" style="margin-bottom:var(--space-md);margin-top:var(--space-sm)">`;
    spielTeilnehmer.forEach(t=>{html+=`<div class="counter-row">${avatarHtml(t.spieler,36)}<div class="counter-info"><div class="counter-name">${t.spieler.name}</div><div class="counter-sub" id="pot-${t.id}">€${(t.buyins*5).toFixed(0)} im Pot</div></div><div class="counter-controls"><button class="counter-btn minus" data-id="${t.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg></button><div class="counter-value" id="count-${t.id}">${t.buyins}</div><button class="counter-btn plus" data-id="${t.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div></div>`;});
    html+=`</div><div class="section-title">Ergebnis (PayOut)</div>
    <div class="card" style="margin-top:var(--space-sm);margin-bottom:var(--space-sm)">`;
    spielTeilnehmer.forEach(t=>{html+=`<div class="payout-input-row"><div style="display:flex;align-items:center;gap:8px;flex:1">${avatarHtml(t.spieler,28)}<span style="font-size:14px;font-weight:500">${t.spieler.name}</span></div><input type="number" class="payout-field" id="payout-${t.id}" data-id="${t.id}" value="${t.payout}" min="0" step="0.01" placeholder="0.00"><span class="payout-unit">€</span></div>`;});
    html+=`</div>
    <div class="pot-summary" id="pot-rest-summary"><span class="pot-summary-label">Pot: €${gesamtPot} · Zugeordnet: €0</span><span class="pot-summary-value">Rest: €${gesamtPot.toFixed(2)}</span></div>
    <button class="btn btn-danger" id="btn-abschliessen" style="margin-top:var(--space-md)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Spiel abschließen</button>
    <button class="btn btn-ghost" id="btn-spiel-loeschen" style="margin-top:var(--space-sm)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>Spiel verwerfen</button>`;
    el.innerHTML=html;

    updatePotSummary();
    el.querySelectorAll('.counter-btn.plus').forEach(btn=>btn.addEventListener('click',()=>buyinChange(btn.dataset.id,+1)));
    el.querySelectorAll('.counter-btn.minus').forEach(btn=>btn.addEventListener('click',()=>buyinChange(btn.dataset.id,-1)));
    spielTeilnehmer.forEach(t=>{
      document.getElementById('payout-'+t.id)?.addEventListener('change',async e=>{
        const payout=parseFloat(e.target.value)||0;
        await save(()=>db.from('spiel_teilnehmer').update({payout}).eq('id',t.id),`PayOut ${t.spieler.name}: €${payout}`);
        updatePotSummary();
      });
      document.getElementById('payout-'+t.id)?.addEventListener('input',updatePotSummary);
    });
    document.getElementById('btn-edit-teilnehmer').addEventListener('click',zeigeTeilnehmerEdit);
    document.getElementById('btn-abschliessen').addEventListener('click',schliesseSpielAb);
    document.getElementById('btn-spiel-loeschen').addEventListener('click',async()=>{
      if(!confirmDelete(`Das aktuelle Spiel vom ${datum} wird ohne Speichern gelöscht.\nAlle Buy-Ins und Ergebnisse gehen verloren.`))return;
      await save(async()=>{
        await db.from('spiel_teilnehmer').delete().eq('spiel_id',aktuellesSpiel.id);
        await db.from('spiele').delete().eq('id',aktuellesSpiel.id);
      },'Spiel verworfen');
      aktuellesSpiel=null;spielTeilnehmer=[];
      await loadSpiel();
    });
  }

  async function buyinChange(id,delta){
    const t=spielTeilnehmer.find(x=>x.id===id);if(!t||(delta<0&&t.buyins<=0))return;
    t.buyins+=delta;
    document.getElementById('count-'+id).textContent=t.buyins;
    document.getElementById('pot-'+id).textContent=`€${(t.buyins*5).toFixed(0)} im Pot`;
    updateGesamtPot();
    updatePotSummary();
    await save(()=>db.from('spiel_teilnehmer').update({buyins:t.buyins}).eq('id',id),`BuyIn ${t.spieler.name}: ${t.buyins}×`);
  }

  async function schliesseSpielAb(){
    if(!confirmAction('Spiel wirklich abschließen? Alle Ergebnisse werden gespeichert.'))return;
    await db.from('spiele').update({abgeschlossen:true}).eq('id',aktuellesSpiel.id);
    aktuellesSpiel=null;spielTeilnehmer=[];
    await loadSpiel();await loadHome();
  }

  function zeigeTeilnehmerEdit(){
    const spieler=alleSpieler.filter(s=>!s.ist_bank);
    const aktivIds=new Set(spielTeilnehmer.map(t=>t.spieler_id));
    const liste=document.getElementById('teilnehmer-edit-liste');
    liste.innerHTML=`<div class="select-grid">${spieler.map(s=>`<div class="select-card ${aktivIds.has(s.id)?'selected':''}" data-id="${s.id}">${avatarHtml(s,44)}<span class="select-card-name">${s.name}</span></div>`).join('')}</div>`;
    liste.querySelectorAll('.select-card').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('selected')));
    document.getElementById('modal-teilnehmer-edit').classList.add('open');
  }
  document.getElementById('teilnehmer-edit-abbrechen').addEventListener('click',()=>document.getElementById('modal-teilnehmer-edit').classList.remove('open'));
  document.getElementById('teilnehmer-edit-speichern').addEventListener('click',async()=>{
    const selected=new Set(Array.from(document.querySelectorAll('#teilnehmer-edit-liste .select-card.selected')).map(c=>c.dataset.id));
    const aktuelleIds=new Set(spielTeilnehmer.map(t=>t.spieler_id));
    const hinzufuegen=[...selected].filter(id=>!aktuelleIds.has(id));
    const entfernen=spielTeilnehmer.filter(t=>!selected.has(t.spieler_id));
    const mitBuyins=entfernen.filter(t=>t.buyins>0);
    if(mitBuyins.length>0){if(!confirmAction(`${mitBuyins.map(t=>t.spieler.name).join(', ')} ${mitBuyins.length>1?'haben':'hat'} bereits Buy-Ins und wird entfernt. Wirklich fortfahren?`))return;}
    setSync('pending');
    for(const t of entfernen)await db.from('spiel_teilnehmer').delete().eq('id',t.id);
    if(hinzufuegen.length>0)await db.from('spiel_teilnehmer').insert(hinzufuegen.map(id=>({spiel_id:aktuellesSpiel.id,spieler_id:id,buyins:1,payout:0,leihgabe:0})));
    setSync('synced');
    document.getElementById('modal-teilnehmer-edit').classList.remove('open');
    await loadSpiel();
  });

  function zeigeSpielAuswahl(){
    const spieler=alleSpieler.filter(s=>!s.ist_bank);
    const liste=document.getElementById('spieler-auswahl-liste');
    liste.innerHTML=`<div class="select-grid">${spieler.map(s=>`<div class="select-card" data-id="${s.id}">${avatarHtml(s,44)}<span class="select-card-name">${s.name}</span></div>`).join('')}</div>`;
    liste.querySelectorAll('.select-card').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('selected')));
    document.getElementById('modal-spieler-auswahl').classList.add('open');
  }
  document.getElementById('modal-auswahl-abbrechen').addEventListener('click',()=>document.getElementById('modal-spieler-auswahl').classList.remove('open'));
  document.getElementById('modal-auswahl-bestaetigen').addEventListener('click',async()=>{
    const selected=document.querySelectorAll('#spieler-auswahl-liste .select-card.selected');
    if(selected.length<2){alert('Bitte mindestens 2 Spieler auswählen.');return;}
    const{data:neuesSpiel}=await db.from('spiele').insert({datum:new Date().toISOString().split('T')[0]}).select().single();
    await db.from('spiel_teilnehmer').insert(Array.from(selected).map(el=>({spiel_id:neuesSpiel.id,spieler_id:el.dataset.id,buyins:1,payout:0,leihgabe:0})));
    document.getElementById('modal-spieler-auswahl').classList.remove('open');
    aktuellesSpiel=neuesSpiel;
    await loadSpiel();
  });

  // ── INIT ───────────────────────────────────────────────
  const{data:{session}}=await db.auth.getSession();
  if(session){currentUser=session.user;showApp();}
</script>
</body>
</html>
