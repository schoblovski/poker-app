<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="version" content="1.4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d0f" id="theme-color-meta">
  <title>DTKS Poker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--radius-sm:8px;--radius-md:14px;--radius-lg:20px;--radius-xl:28px;--space-xs:4px;--space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px;--font-sans:'DM Sans',-apple-system,sans-serif;--font-mono:'DM Mono',monospace;--transition:180ms ease;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);}
    [data-theme="light"]{--bg:#f2f2f7;--bg-elevated:#fff;--bg-secondary:#e8e8ed;--surface:#fff;--border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.15);--text-primary:#1c1c1e;--text-secondary:#6c6c70;--text-tertiary:#aeaeb2;--accent:#16a34a;--accent-soft:#dcfce7;--accent-text:#15803d;--danger:#dc2626;--danger-soft:#fee2e2;--warning:#d97706;--warning-soft:#fef3c7;--info:#2563eb;--info-soft:#dbeafe;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);--shadow-lg:0 8px 30px rgba(0,0,0,.12);--nav-bg:rgba(242,242,247,.88);--header-bg:rgba(242,242,247,.88);--theme-color:#f2f2f7;}
    [data-theme="dark"]{--bg:#0d0d0f;--bg-elevated:#1c1c1e;--bg-secondary:#2c2c2e;--surface:#1c1c1e;--border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.15);--text-primary:#f5f5f7;--text-secondary:#98989f;--text-tertiary:#636366;--accent:#22c55e;--accent-soft:#052e16;--accent-text:#4ade80;--danger:#f87171;--danger-soft:#2d0a0a;--warning:#fbbf24;--warning-soft:#2d1f00;--info:#60a5fa;--info-soft:#1e3a5f;--shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);--shadow-lg:0 8px 30px rgba(0,0,0,.5);--nav-bg:rgba(13,13,15,.88);--header-bg:rgba(13,13,15,.88);--theme-color:#0d0d0f;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{height:100%;}
    body{font-family:var(--font-sans);background:var(--bg);color:var(--text-primary);min-height:100dvh;display:flex;flex-direction:column;transition:background var(--transition),color var(--transition);-webkit-font-smoothing:antialiased;}

    /* LOGIN */
    #login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--safe-top)+40px) var(--space-xl) calc(var(--safe-bottom)+40px);position:relative;overflow:hidden;}
    .login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(34,197,94,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(34,197,94,.08) 0%,transparent 50%);pointer-events:none;}
    .login-card{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:var(--space-md);width:100%;max-width:320px;}
    .login-suit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:var(--space-sm);}
    .login-suit{width:56px;height:56px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;}
    .suit-spade,.suit-club{background:#1c1c1e;color:#f5f5f7;}
    .suit-heart,.suit-diamond{background:#fee2e2;color:#dc2626;}
    .login-title{font-size:28px;font-weight:700;letter-spacing:-.5px;text-align:center;}
    .login-subtitle{font-size:13px;color:var(--text-secondary);letter-spacing:.3px;text-transform:uppercase;font-weight:500;}
    .login-divider{display:flex;align-items:center;gap:var(--space-sm);width:100%;margin:var(--space-xs) 0;}
    .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border-strong);}
    .login-divider span{font-size:11px;color:var(--text-tertiary);font-weight:500;}
    .btn-oauth{display:flex;align-items:center;gap:10px;background:var(--surface);color:var(--text-primary);border:1px solid var(--border-strong);border-radius:var(--radius-md);padding:13px var(--space-md);font-size:14px;font-weight:500;cursor:pointer;width:100%;justify-content:center;box-shadow:var(--shadow);transition:all var(--transition);font-family:var(--font-sans);}
    .btn-oauth:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg);}
    .btn-oauth:active{transform:scale(.98);}
    .btn-oauth svg{width:20px;height:20px;flex-shrink:0;}

    /* APP */
    #app-screen{display:none;flex-direction:column;flex:1;max-width:430px;margin:0 auto;width:100%;}
    .header{padding:calc(var(--safe-top)+12px) calc(var(--safe-right)+var(--space-md)) 12px calc(var(--safe-left)+var(--space-md));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .header-left{display:flex;flex-direction:column;}
    .header-app-name{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;}
    .header-page-title{font-size:17px;font-weight:700;color:var(--text-primary);letter-spacing:-.3px;}
    .header-right{display:flex;align-items:center;gap:10px;position:relative;}
    .sync-badge{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:20px;font-size:11px;font-weight:600;transition:all var(--transition);}
    .sync-badge.synced{background:var(--accent-soft);color:var(--accent-text);}
    .sync-badge.pending{background:var(--warning-soft);color:var(--warning);}
    .sync-badge.error{background:var(--danger-soft);color:var(--danger);}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
    .sync-dot.spin{animation:spin .8s linear infinite;}
    .avatar-btn{width:34px;height:34px;border-radius:50%;background:var(--bg-secondary);border:none;cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .avatar-btn img{width:100%;height:100%;object-fit:cover;}
    .avatar-btn svg{width:18px;height:18px;color:var(--text-secondary);}
    .content{flex:1;overflow-y:auto;padding:var(--space-lg) var(--space-lg);padding-left:calc(var(--safe-left) + var(--space-lg));padding-right:calc(var(--safe-right) + var(--space-lg));padding-bottom:calc(var(--safe-bottom) + 90px);}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:50;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px 8px;border:none;background:none;cursor:pointer;color:var(--text-tertiary);transition:color var(--transition);}
    .nav-btn.active{color:var(--accent);}
    .nav-btn svg{width:22px;height:22px;stroke-width:1.8;}
    .nav-btn.active svg{stroke-width:2.2;}
    .nav-label{font-size:10px;font-weight:500;letter-spacing:.2px;}

    /* COMPONENTS */
    .section-title{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.7px;margin:var(--space-lg) 0 var(--space-sm);}
    .section-title:first-child{margin-top:0;}
    .card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;}
    .card+.card{margin-top:var(--space-sm);}
    .list-item{display:flex;align-items:center;gap:var(--space-md);padding:14px var(--space-md);border-bottom:1px solid var(--border);transition:background var(--transition);}
    .list-item:last-child{border-bottom:none;}
    .list-item.clickable{cursor:pointer;}
    .list-item.clickable:active{background:var(--bg-secondary);}
    .item-avatar{width:44px;height:44px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
    .item-avatar img{width:100%;height:100%;object-fit:cover;}
    .item-avatar svg{width:22px;height:22px;color:var(--text-tertiary);}
    .item-avatar.accent{background:var(--accent-soft);}.item-avatar.accent svg{color:var(--accent);}
    .item-avatar.warn{background:var(--warning-soft);}.item-avatar.warn svg{color:var(--warning);}
    .item-avatar.danger{background:var(--danger-soft);}.item-avatar.danger svg{color:var(--danger);}
    .item-avatar.info{background:var(--info-soft);}.item-avatar.info svg{color:var(--info);}
    .item-body{flex:1;min-width:0;}
    .item-title{font-size:15px;font-weight:500;color:var(--text-primary);}
    .item-subtitle{font-size:12px;color:var(--text-secondary);margin-top:2px;}
    .item-trailing{display:flex;align-items:center;gap:var(--space-sm);flex-shrink:0;}
    .item-amount{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
    .amount-pos{color:var(--accent-text);}
    .amount-neg{color:var(--danger);}
    .amount-zero{color:var(--text-tertiary);}
    .chevron svg{width:16px;height:16px;color:var(--text-tertiary);}
    .btn{display:flex;align-items:center;justify-content:center;gap:var(--space-sm);border:none;border-radius:var(--radius-md);padding:14px var(--space-lg);font-size:15px;font-weight:600;cursor:pointer;width:100%;max-width:400px;transition:all var(--transition);font-family:var(--font-sans);}
    .btn svg{width:18px;height:18px;}
    .btn:active{transform:scale(.98);}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-secondary{background:var(--bg-secondary);color:var(--text-primary);}
    .btn-danger{background:var(--danger-soft);color:var(--danger);}
    .btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-strong);}
    .btn+.btn{margin-top:var(--space-sm);}
    .counter-row{display:flex;align-items:center;gap:var(--space-md);padding:14px var(--space-md);border-bottom:1px solid var(--border);}
    .counter-row:last-child{border-bottom:none;}
    .counter-info{flex:1;}
    .counter-name{font-size:15px;font-weight:500;}
    .counter-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
    .counter-controls{display:flex;align-items:center;gap:var(--space-sm);}
    .counter-btn{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);}
    .counter-btn svg{width:16px;height:16px;}
    .counter-btn.minus{background:var(--danger-soft);color:var(--danger);}
    .counter-btn.plus{background:var(--accent-soft);color:var(--accent-text);}
    .counter-btn:active{transform:scale(.88);}
    .counter-value{font-size:18px;font-weight:700;min-width:28px;text-align:center;font-variant-numeric:tabular-nums;}
    .form-group{margin-bottom:var(--space-md);}
    .form-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px;}
    .form-input{width:100%;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px var(--space-md);color:var(--text-primary);font-size:15px;font-family:var(--font-sans);transition:border-color var(--transition),box-shadow var(--transition);}
    .form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,197,94,.15);}
    .form-input::placeholder{color:var(--text-tertiary);}
    .payout-input-row{display:flex;align-items:center;gap:var(--space-sm);padding:10px var(--space-md);border-bottom:1px solid var(--border);}
    .payout-input-row:last-child{border-bottom:none;}
    .payout-field{flex:1;background:transparent;border:none;color:var(--text-primary);font-size:15px;font-weight:500;font-family:var(--font-mono);text-align:right;padding:4px 0;}
    .payout-field:focus{outline:none;}
    .payout-unit{font-size:13px;color:var(--text-tertiary);}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm);margin-bottom:var(--space-sm);}
    .stat-card{background:var(--surface);border-radius:var(--radius-lg);padding:var(--space-md);box-shadow:var(--shadow);}
    .stat-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px;}
    .stat-value{font-size:22px;font-weight:700;margin-top:6px;letter-spacing:-.5px;font-variant-numeric:tabular-nums;}
    .stat-value.sm{font-size:17px;}
    .stat-sub{font-size:12px;color:var(--text-secondary);margin-top:3px;}
    .stat-card.wide{grid-column:1/-1;}
    .stat-card.accent{background:var(--accent-soft);}.stat-card.accent .stat-label{color:var(--accent-text);opacity:.8;}.stat-card.accent .stat-value{color:var(--accent-text);}
    .stat-card.info{background:var(--info-soft);}.stat-card.info .stat-label{color:var(--info);opacity:.8;}.stat-card.info .stat-value{color:var(--info);}
    .profile-header{text-align:center;padding:var(--space-lg) 0 var(--space-md);}
    .profile-avatar-lg{width:80px;height:80px;border-radius:50%;background:var(--bg-secondary);overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-md);}
    .profile-avatar-lg img{width:100%;height:100%;object-fit:cover;}
    .profile-avatar-lg svg{width:40px;height:40px;color:var(--text-tertiary);}
    .profile-name{font-size:22px;font-weight:700;letter-spacing:-.3px;}
    .profile-since{font-size:13px;color:var(--text-secondary);margin-top:4px;}
    .timeline-item{display:flex;gap:var(--space-md);padding:12px var(--space-md);border-bottom:1px solid var(--border);}
    .timeline-item:last-child{border-bottom:none;}
    .timeline-date{font-size:12px;color:var(--text-secondary);width:60px;flex-shrink:0;padding-top:2px;}
    .timeline-body{flex:1;}
    .timeline-title{font-size:14px;font-weight:500;}
    .timeline-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
    .timeline-amount{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0;padding-top:2px;}
    .select-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-sm);margin-top:var(--space-sm);}
    .select-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-md);padding:var(--space-md);display:flex;flex-direction:column;align-items:center;gap:var(--space-sm);cursor:pointer;transition:all var(--transition);text-align:center;}
    .select-card.selected{border-color:var(--accent);background:var(--accent-soft);}
    .select-card-name{font-size:14px;font-weight:500;}
    .dropdown{position:absolute;top:calc(100% + 8px);right:var(--space-md);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-xs);z-index:200;display:none;box-shadow:var(--shadow-lg);min-width:200px;}
    .dropdown.open{display:block;animation:fadeIn 120ms ease;}
    .dropdown-item{display:flex;align-items:center;gap:var(--space-sm);padding:11px var(--space-md);border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;color:var(--text-primary);transition:background var(--transition);border:none;background:none;width:100%;text-align:left;font-family:var(--font-sans);}
    .dropdown-item:hover{background:var(--bg-secondary);}
    .dropdown-item svg{width:16px;height:16px;color:var(--text-secondary);}
    .dropdown-item.danger{color:var(--danger);}.dropdown-item.danger svg{color:var(--danger);}
    .dropdown-divider{height:1px;background:var(--border);margin:var(--space-xs) 0;}
    .theme-picker{display:flex;gap:var(--space-xs);padding:var(--space-xs) var(--space-md) var(--space-sm);}
    .theme-btn{flex:1;padding:7px;border-radius:var(--radius-sm);font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;background:var(--bg-secondary);color:var(--text-secondary);font-family:var(--font-sans);transition:all var(--transition);}
    .theme-btn.active{background:var(--accent-soft);color:var(--accent-text);border-color:var(--accent);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
    .modal-overlay.open{display:flex;animation:fadeIn 150ms ease;}
    .modal{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:var(--space-lg) var(--space-xl) calc(var(--safe-bottom) + var(--space-lg));width:100%;max-width:430px;max-height:92vh;overflow-y:auto;}
    .modal-handle{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto var(--space-lg);}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:var(--space-lg);letter-spacing:-.3px;}
    .modal-actions{display:flex;gap:var(--space-sm);margin-top:var(--space-lg);}
    .modal-actions .btn{flex:1;}
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
    .badge-green{background:var(--accent-soft);color:var(--accent-text);}
    .badge-red{background:var(--danger-soft);color:var(--danger);}
    .kommentar-chip{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-primary);font-family:var(--font-sans);text-align:left;transition:all var(--transition);width:100%;}
    .kommentar-chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-text);}
    .page{display:none;}.page.active{display:block;}
    .back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--accent-text);font-size:15px;font-weight:500;padding:0;font-family:var(--font-sans);margin-bottom:var(--space-lg);}
    .back-btn svg{width:20px;height:20px;}
    .loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text-tertiary);gap:var(--space-sm);font-size:14px;}
    .spinner{width:20px;height:20px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
    .empty{text-align:center;padding:48px var(--space-md);}
    .empty-icon{width:56px;height:56px;border-radius:var(--radius-xl);background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-md);}
    .empty-icon svg{width:28px;height:28px;color:var(--text-tertiary);}
    .empty-title{font-size:17px;font-weight:600;margin-bottom:6px;}
    .empty-subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:var(--space-lg);}
    .pot-summary{background:var(--accent-soft);border-radius:var(--radius-md);padding:10px var(--space-md);display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:var(--space-sm);}
    .pot-summary-label{color:var(--accent-text);font-weight:500;}
    .pot-summary-value{color:var(--accent-text);font-weight:700;font-variant-numeric:tabular-nums;}
    .pot-summary-value.warn{color:var(--warning);}
    .setting-row{display:flex;align-items:center;gap:var(--space-md);padding:14px var(--space-md);border-bottom:1px solid var(--border);}
    .setting-row:last-child{border-bottom:none;}
    .setting-info{flex:1;}
    .setting-label{font-size:15px;font-weight:500;}
    .setting-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
    .setting-input{width:80px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text-primary);font-size:15px;font-weight:600;font-family:var(--font-mono);text-align:right;}
    .setting-input:focus{outline:none;border-color:var(--accent);}
    .kasse-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:var(--space-sm);}
    .kasse-row{display:flex;align-items:center;justify-content:space-between;padding:14px var(--space-md);border-bottom:1px solid var(--border);}
    .kasse-row:last-child{border-bottom:none;}
    .kasse-label{font-size:13px;color:var(--text-secondary);font-weight:500;}
    .kasse-value{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-suit-grid">
      <div class="login-suit suit-spade">♠</div>
      <div class="login-suit suit-heart">♥</div>
      <div class="login-suit suit-diamond">♦</div>
      <div class="login-suit suit-club">♣</div>

  // ── THEME ──────────────────────────────────────────────
  function applyTheme(p){
    const d=p==='dark'||(p==='auto'&&window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.setAttribute('data-theme',d?'dark':'light');
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===p));
    const color=d?'#0d0d0f':'#f2f2f7';
    const meta=document.getElementById('theme-color-meta');
    meta.setAttribute('content','');
    requestAnimationFrame(()=>meta.setAttribute('content',color));
  }
  function setTheme(p){localStorage.setItem('dtks-theme',p);applyTheme(p);}
  const st=localStorage.getItem('dtks-theme')||'auto'; applyTheme(st);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{if((localStorage.getItem('dtks-theme')||'auto')==='auto')applyTheme('auto');});
  document.querySelectorAll('.theme-btn').forEach(b=>{b.classList.toggle('active',b.dataset.theme===st);b.addEventListener('click',()=>setTheme(b.dataset.theme));});

  // ── SYNC ───────────────────────────────────────────────
  function setSync(s){const el=document.getElementById('sync-status'),dot=document.getElementById('sync-dot'),lbl=document.getElementById('sync-label');el.className='sync-badge '+s;dot.className='sync-dot'+(s==='pending'?' spin':'');lbl.textContent={synced:'Sync',pending:'…',error:'Fehler'}[s];}
  async function save(fn,desc){setSync('pending');console.log(`💾 ${desc}`);try{await fn();setSync('synced');console.log(`✅ ${desc}`);}catch(e){setSync('error');console.error(`❌ ${desc}`,e);}}

  // ── HELPERS ────────────────────────────────────────────
  const ksClass=v=>v>0?'amount-pos':v<0?'amount-neg':'amount-zero';
  const fmt=v=>{const abs=Math.abs(v).toFixed(2);return v<0?`−\u00a0€${abs}`:`€\u00a0${abs}`;};
  const fmtSigned=v=>(v>=0?'+':'')+`\u00a0€${v.toFixed(2)}`;
  const chevron=`<div class="chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>`;
  const userIcon=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`;

  function confirmDelete(msg){return confirm(`⚠️ Löschen bestätigen\n\n${msg}\n\nDiese Aktion kann nicht rückgängig gemacht werden.`);}
  function confirmAction(msg){return confirm(msg);}

  // ── FINANZLOGIK ────────────────────────────────────────
  function berechneKontostaende(spieler, trans, spielVerlauf, spieleMap){
    const ks={};
    spieler.forEach(s=>{ks[s.id]=0;});

    // Transaktionen
    (trans||[]).forEach(t=>{
      const v=t.von_spieler_id, n=t.nach_spieler_id;
      if(n&&ks[n]!==undefined) ks[n]+=t.betrag;
      if(v&&ks[v]!==undefined) ks[v]-=t.betrag;
    });

    // Spielergebnisse: payout - buyins * buyin_pot (NUR Pot-Anteil, kein Kassa, kein Leihgabe)
    // buyin_pot kommt vom jeweiligen Spiel (historisch korrekt)
    (spielVerlauf||[]).forEach(t=>{
      if(ks[t.spieler_id]!==undefined){
        const spielBuyinPot = spieleMap?.[t.spiel_id]?.buyin_pot ?? einstellungen.buyin_pot;
        ks[t.spieler_id]+=(t.payout||0);
        ks[t.spieler_id]-=(t.buyins||0)*spielBuyinPot;
      }
    });
    return ks;
  }

  function berechneBankkonto(trans){
    let bank=0;
    const bankSpieler=alleSpieler.find(s=>s.ist_bank);
    (trans||[]).forEach(t=>{
      const vonId=t.von_spieler_id, nachId=t.nach_spieler_id;
      const vonBank=vonId&&alleSpieler.find(s=>s.id===vonId)?.ist_bank;
      const nachBank=nachId&&alleSpieler.find(s=>s.id===nachId)?.ist_bank;
      const vonLeer=!vonId;
      const nachLeer=!nachId;
      // Einzahlung: LEER→SPIELER
      if(vonLeer&&nachId&&!nachBank) bank+=t.betrag;
      // Auszahlung: SPIELER→LEER
      if(vonId&&!vonBank&&nachLeer) bank-=t.betrag;
      // LEER→BANK (Zinsen, Eingang)
      if(vonLeer&&nachBank) bank+=t.betrag;
      // BANK→LEER
      if(vonBank&&nachLeer) bank-=t.betrag;
    });
    return bank;
  }

  function berechnePokerkasse(trans, spielVerlauf){
    // Akkumuliert aus Buy-Ins
    let kasse=(spielVerlauf||[]).reduce((s,t)=>s+(t.buyins||0)*einstellungen.buyin_kassa,0);
    // +SPIELER→BANK (Spenden), -BANK→SPIELER (Erstattungen)
    (trans||[]).forEach(t=>{
      const vonId=t.von_spieler_id, nachId=t.nach_spieler_id;
      const vonBank=vonId&&alleSpieler.find(s=>s.id===vonId)?.ist_bank;
      const nachBank=nachId&&alleSpieler.find(s=>s.id===nachId)?.ist_bank;
      if(!vonBank&&vonId&&nachBank) kasse+=t.betrag; // SPIELER→BANK
      if(vonBank&&nachId&&!nachBank) kasse-=t.betrag; // BANK→SPIELER
    });
    return kasse;
  }

  // Transaktions-Icon
  function transIcon(t){
    const vonId=t.von_spieler_id, nachId=t.nach_spieler_id;
    const vonBank=vonId&&alleSpieler.find(s=>s.id===vonId)?.ist_bank;
    const nachBank=nachId&&alleSpieler.find(s=>s.id===nachId)?.ist_bank;
    if(!vonId&&nachId&&!nachBank) return{cls:'accent',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M2 12l10-10 10 10"/></svg>`,label:'Einzahlung'};
    if(vonId&&!vonBank&&!nachId) return{cls:'danger',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22V2M17 7l-5 5-5-5"/><path d="M3 20h18"/></svg>`,label:'Auszahlung'};
    if(vonId&&nachId&&!vonBank&&!nachBank) return{cls:'warn',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>`,label:'Transfer'};
    if(vonBank&&nachId&&!nachBank) return{cls:'info',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/><path d="M12 11v6"/></svg>`,label:'Kasse→Spieler'};
    if(!vonId&&nachBank) return{cls:'accent',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/><path d="M12 17v-6"/></svg>`,label:'Eingang Bank'};
    if(vonId&&!vonBank&&nachBank) return{cls:'warn',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>`,label:'Spende'};
    return{cls:'',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>`,label:'Transaktion'};
  }

  // ── NAVIGATION ─────────────────────────────────────────
  const pageTitles={home:'Übersicht',spiel:'Aktuelles Spiel',verlauf:'Spiel Verlauf',statistik:'Statistik',transaktionen:'Transaktionen',verwaltung:'Spielerverwaltung',einstellungen:'Einstellungen','spieler-detail':'Spieler','spieler-stats':'Statistik'};
  function showPage(page){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');

    if(page==='spiel')loadSpiel();
    if(page==='verwaltung')loadVerwaltung();
    if(page==='einstellungen')loadEinstellungen();
    if(page==='verlauf')loadVerlauf();
    if(page==='statistik')loadStatistik();

  // ── SPIELER STATS ──────────────────────────────────────
  async function showSpielerStats(spieler){
    const el=document.getElementById('spieler-stats-content');
    el.innerHTML=`<div class="loading"><div class="spinner"></div>Lade…</div>`;
    showPage('spieler-stats');
    const buyinGesamt=einstellungen.buyin_pot+einstellungen.buyin_kassa;

    const[{data:verlauf},{data:haende},{data:transOut},{data:transIn},{data:spieleData}]=await Promise.all([
      db.from('spiel_teilnehmer').select('*,spiele(datum,abgeschlossen,buyin_pot)').eq('spieler_id',spieler.id).order('created_at',{ascending:false}),
      db.from('hand_statistik').select('*').eq('gewinner_id',spieler.id),
      db.from('transaktionen').select('*').eq('von_spieler_id',spieler.id).order('datum',{ascending:false}),
      db.from('transaktionen').select('*').eq('nach_spieler_id',spieler.id).order('datum',{ascending:false}),
      db.from('spiele').select('id,buyin_pot').eq('abgeschlossen',true),
    ]);
    const spieleMap={};(spieleData||[]).forEach(s=>{spieleMap[s.id]=s;});

    const abg=(verlauf||[]).filter(t=>t.spiele?.abgeschlossen);
    const n=abg.length;
    const gBuyins=abg.reduce((s,t)=>s+(t.buyins||0),0);
    const gPayout=abg.reduce((s,t)=>s+(t.payout||0),0);
    // Reingewinn = payout - buyins * buyin_pot (pro Spiel, historisch korrekt)
    const reingewinne=abg.map(t=>{
      const bPot=t.spiele?.buyin_pot??einstellungen.buyin_pot;
      return (t.payout||0)-(t.buyins||0)*bPot;
    });
    const gRein=reingewinne.reduce((s,v)=>s+v,0);
    const avgRein=n>0?gRein/n:0;
    const maxRein=reingewinne.length>0?Math.max(...reingewinne):0;
    const minRein=reingewinne.length>0?Math.min(...reingewinne):0;
    const avgBuyins=n>0?gBuyins/n:0;
    const maxBuyins=abg.length>0?Math.max(...abg.map(t=>t.buyins||0)):0;
    const ks=spieler._ks||0;
    const seit=spieler.eintrittsdatum?new Date(spieler.eintrittsdatum).getFullYear():'–';

    let html=`<button class="back-btn" id="stats-back">${backIcon} Zurück</button>
      <div class="profile-header">${spieler.profilbild?`<div class="profile-avatar-lg"><img src="${spieler.profilbild}" alt="${spieler.name}"></div>`:`<div class="profile-avatar-lg">${userIcon}</div>`}
        <div class="profile-name">${spieler.name}</div><div class="profile-since">Dabei seit ${seit} · ${n} Spiele</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card accent wide"><div class="stat-label">Kontostand</div><div class="stat-value ${ksClass(ks)}">${fmt(ks)}</div></div>
        <div class="stat-card wide"><div class="stat-label">Reingewinn gesamt</div><div class="stat-value sm ${ksClass(gRein)}">${fmtSigned(gRein)}</div><div class="stat-sub">Ø ${fmtSigned(avgRein)} pro Abend</div></div>
        <div class="stat-card"><div class="stat-label">Bestes Ergebnis</div><div class="stat-value sm amount-pos">${fmtSigned(maxRein)}</div></div>
        <div class="stat-card"><div class="stat-label">Schlechtestes</div><div class="stat-value sm amount-neg">${fmtSigned(minRein)}</div></div>
        <div class="stat-card"><div class="stat-label">Buy-Ins gesamt</div><div class="stat-value sm">${gBuyins}</div><div class="stat-sub">Ø ${avgBuyins.toFixed(1)} · Max ${maxBuyins}</div></div>
        <div class="stat-card"><div class="stat-label">PayOut gesamt</div><div class="stat-value sm">€${gPayout.toFixed(0)}</div></div>
        <div class="stat-card"><div class="stat-label">Besondere Hände</div><div class="stat-value sm">${(haende||[]).length}</div></div>
        <div class="stat-card"><div class="stat-label">7-2 Gewinne</div><div class="stat-value sm">${(haende||[]).filter(h=>h.hand==='7-2').length}</div></div>
      </div>`;

    const letzteSpiele=abg.slice(0,10);
    if(letzteSpiele.length>0){
      html+=`<div class="section-title">Letzte Spiele</div><div class="card">`;
      letzteSpiele.forEach((t,i)=>{
        const rein=reingewinne[i];
        const d=new Date(t.spiele.datum).toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});
        html+=`<div class="timeline-item"><div class="timeline-date">${d}</div><div class="timeline-body"><div class="timeline-title">${t.buyins}× BuyIn · €${(t.payout||0).toFixed(2)} PayOut</div></div><div class="timeline-amount ${ksClass(rein)}">${fmtSigned(rein)}</div></div>`;
      });
      html+=`</div>`;
    }

    const alleTrans=[...(transIn||[]).map(t=>({...t,dir:'in'})),...(transOut||[]).map(t=>({...t,dir:'out'}))].sort((a,b)=>new Date(b.datum)-new Date(a.datum)).slice(0,8);
    if(alleTrans.length>0){
      html+=`<div class="section-title">Letzte Kontobewegungen</div><div class="card">`;
      alleTrans.forEach(t=>{
        const d=new Date(t.datum).toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});
        const sign=t.dir==='in'?'+':'-'; const cls=t.dir==='in'?'amount-pos':'amount-neg';
        html+=`<div class="timeline-item"><div class="timeline-date">${d}</div><div class="timeline-body"><div class="timeline-title">${t.kommentar||'Transaktion'}</div></div><div class="timeline-amount ${cls}">${sign}€${t.betrag.toFixed(2)}</div></div>`;
      });
      html+=`</div>`;
    }
    el.innerHTML=html;
    document.getElementById('stats-back').addEventListener('click',()=>showPage('home'));
  }

  async function loadTransaktionen(){
    const el=document.getElementById('transaktionen-content');
    const{data:trans}=await db.from('transaktionen').select('*,von:von_spieler_id(id,name,ist_bank),nach:nach_spieler_id(id,name,ist_bank)').order('datum',{ascending:false}).order('created_at',{ascending:false}).limit(100);
    if(!trans||trans.length===0){el.innerHTML=`<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div><div class="empty-title">Keine Transaktionen</div></div>`;return;}
    const gruppen={};
    trans.forEach(t=>{if(!gruppen[t.datum])gruppen[t.datum]={datum:t.datum,items:[],summe:0};gruppen[t.datum].items.push(t);gruppen[t.datum].summe+=t.betrag;});
    let html='';
    Object.values(gruppen).forEach(g=>{
      const ds=new Date(g.datum).toLocaleDateString('de-AT',{day:'2-digit',month:'long',year:'numeric'});
      html+=`<div class="section-title">${ds} <span style="font-weight:400;color:var(--text-tertiary)">· €${g.summe.toFixed(2)}</span></div><div class="card">`;

  function openTransaktionModal(t){
    editTransaktionID=t?.id||null;
    document.getElementById('trans-modal-title').textContent=t?'Transaktion bearbeiten':'Neue Transaktion';
    document.getElementById('trans-datum').value=t?.datum||new Date().toISOString().split('T')[0];
    document.getElementById('trans-betrag').value=t?.betrag||'';
    const opts=alleSpieler.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
    document.getElementById('trans-von').innerHTML=`<option value="">– leer –</option>${opts}`;
    document.getElementById('trans-nach').innerHTML=`<option value="">– leer –</option>${opts}`;
    if(t?.von_spieler_id)document.getElementById('trans-von').value=t.von_spieler_id;
    if(t?.nach_spieler_id)document.getElementById('trans-nach').value=t.nach_spieler_id;
    let sel=t?.kommentar&&KOMMENTAR_VORLAGEN.includes(t.kommentar)?t.kommentar:'';
    const chips=document.getElementById('kommentar-chips');
    chips.innerHTML=KOMMENTAR_VORLAGEN.map(k=>`<button class="kommentar-chip${k===sel?' active':''}" data-val="${k}">${k}</button>`).join('');
    document.getElementById('trans-kommentar-text').value=sel?'':(t?.kommentar||'');
    chips.querySelectorAll('.kommentar-chip').forEach(c=>{c.addEventListener('click',()=>{chips.querySelectorAll('.kommentar-chip').forEach(x=>x.classList.remove('active'));if(sel===c.dataset.val){sel='';}else{sel=c.dataset.val;c.classList.add('active');document.getElementById('trans-kommentar-text').value='';}});});
    document.getElementById('trans-kommentar-text').addEventListener('input',()=>{sel='';chips.querySelectorAll('.kommentar-chip').forEach(c=>c.classList.remove('active'));});
    document.getElementById('modal-transaktion')._getKommentar=()=>sel||document.getElementById('trans-kommentar-text').value.trim();
    const existDel=document.getElementById('trans-loeschen');if(existDel)existDel.remove();
    if(t){
      const btn=document.createElement('button');btn.id='trans-loeschen';btn.className='btn btn-danger';btn.style.marginTop='var(--space-sm)';
      btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>Transaktion löschen`;
      btn.addEventListener('click',async()=>{
        if(!confirmDelete(`Transaktion "${t.kommentar}" über €${t.betrag.toFixed(2)} löschen?`))return;
        await save(()=>db.from('transaktionen').delete().eq('id',t.id),'Transaktion gelöscht');
        document.getElementById('modal-transaktion').classList.remove('open');
        await loadTransaktionen();await loadHome();
      });
      document.getElementById('modal-transaktion').querySelector('.modal-actions').before(btn);
    }
    document.getElementById('modal-transaktion').classList.add('open');
  }
  document.getElementById('trans-abbrechen').addEventListener('click',()=>document.getElementById('modal-transaktion').classList.remove('open'));
  document.getElementById('trans-speichern').addEventListener('click',async()=>{
    const datum=document.getElementById('trans-datum').value;
    const von=document.getElementById('trans-von').value||null;
    const nach=document.getElementById('trans-nach').value||null;
    const betrag=parseFloat(document.getElementById('trans-betrag').value)||0;
    const kommentar=document.getElementById('modal-transaktion')._getKommentar();
    if(!nach&&!von){alert('Bitte Von oder Nach auswählen.');return;}
    if(betrag<=0){alert('Bitte einen Betrag eingeben.');return;}
    if(!kommentar){alert('Bitte einen Kommentar wählen oder eingeben.');return;}
    const data={datum,von_spieler_id:von,nach_spieler_id:nach,betrag,kommentar};
    if(editTransaktionID){await save(()=>db.from('transaktionen').update(data).eq('id',editTransaktionID),'Transaktion aktualisiert');}
    else{await save(()=>db.from('transaktionen').insert(data),`Transaktion: ${kommentar} €${betrag}`);}
    document.getElementById('modal-transaktion').classList.remove('open');
    await loadTransaktionen();await loadHome();
  });

  // ── AKTUELLES SPIEL ────────────────────────────────────
  async function loadSpiel(){
    const el=document.getElementById('spiel-content');
    el.innerHTML=`<div class="loading"><div class="spinner"></div>Wird geladen…</div>`;
    const{data:spiele}=await db.from('spiele').select('*').eq('abgeschlossen',false).order('created_at',{ascending:false}).limit(1);
    aktuellesSpiel=spiele?.[0]||null;
    if(!aktuellesSpiel){
      el.innerHTML=`<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3l-4 4-4-4"/></svg></div><div class="empty-title">Kein aktives Spiel</div><div class="empty-subtitle">Starte einen neuen Spielabend.</div><button class="btn btn-primary" id="btn-neues-spiel">Neues Spiel starten</button></div>`;
      document.getElementById('btn-neues-spiel').addEventListener('click',zeigeSpielAuswahl);return;
    }
    const{data:teilnehmer}=await db.from('spiel_teilnehmer').select('*,spieler(*)').eq('spiel_id',aktuellesSpiel.id);
    spielTeilnehmer=teilnehmer||[];
    renderSpiel();
  }

  function calcPotInfo(){
    const gesamtPot=spielTeilnehmer.reduce((s,t)=>s+(t.buyins||0)*einstellungen.buyin_pot,0);
    let zugeordnet=0;
    spielTeilnehmer.forEach(t=>{zugeordnet+=parseFloat(document.getElementById('payout-'+t.id)?.value)||0;});
    return{gesamtPot,zugeordnet,rest:gesamtPot-zugeordnet};
  }

  function updatePotUI(){
    const{gesamtPot,zugeordnet,rest}=calcPotInfo();
    const dp=document.getElementById('gesamt-pot-display');if(dp)dp.textContent=`€${gesamtPot.toFixed(0)}`;
    const ps=document.getElementById('pot-rest-summary');
    if(ps){ps.querySelector('.pot-summary-label').textContent=`Pot €${gesamtPot.toFixed(0)} · Zugeteilt €${zugeordnet.toFixed(0)}`;const v=ps.querySelector('.pot-summary-value');v.textContent=`Rest €${rest.toFixed(2)}`;v.className='pot-summary-value'+(Math.abs(rest)>0.01?' warn':'');}
  }

    });
    html+=`</div>
    <div class="section-title">Ergebnis (PayOut)</div>
    <div class="card" style="margin-top:var(--space-sm)">`;
    spielTeilnehmer.forEach(t=>{
      html+=`<div class="payout-input-row"><div style="display:flex;align-items:center;gap:8px;flex:1">${avatarHtml(t.spieler,28)}<span style="font-size:14px;font-weight:500">${t.spieler.name}</span></div><input type="number" class="payout-field" id="payout-${t.id}" value="${t.payout||0}" min="0" step="0.01" placeholder="0.00"><span class="payout-unit">€</span></div>`;

    html+=`</div>

    spielTeilnehmer.forEach(t=>{
      document.getElementById('payout-'+t.id)?.addEventListener('change',async e=>{
        const payout=parseFloat(e.target.value)||0;
        await save(()=>db.from('spiel_teilnehmer').update({payout}).eq('id',t.id),`PayOut ${t.spieler.name}: €${payout}`);
        updatePotUI();
      });
      document.getElementById('payout-'+t.id)?.addEventListener('input',updatePotUI);
    });
    document.getElementById('btn-edit-teilnehmer').addEventListener('click',zeigeTeilnehmerEdit);
    document.getElementById('btn-abschliessen').addEventListener('click',schliesseSpielAb);
    document.getElementById('btn-spiel-loeschen').addEventListener('click',async()=>{
      const datum=new Date(aktuellesSpiel.datum).toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric'});
      if(!confirmDelete(`Das Spiel vom ${datum} wird ohne Speichern gelöscht. Alle Buy-Ins gehen verloren.`))return;
      await save(async()=>{await db.from('spiel_teilnehmer').delete().eq('spiel_id',aktuellesSpiel.id);await db.from('spiele').delete().eq('id',aktuellesSpiel.id);},'Spiel verworfen');
      aktuellesSpiel=null;spielTeilnehmer=[];await loadSpiel();
    });
  }

  async function buyinChange(id,delta){
    const t=spielTeilnehmer.find(x=>x.id===id);if(!t||(delta<0&&(t.buyins||0)<=0))return;
    t.buyins=(t.buyins||0)+delta;
    document.getElementById('count-'+id).textContent=t.buyins;
    document.getElementById('pot-'+id).textContent=`€${(t.buyins*einstellungen.buyin_pot).toFixed(0)} im Pot`;
    updatePotUI();
    await save(()=>db.from('spiel_teilnehmer').update({buyins:t.buyins}).eq('id',id),`BuyIn ${t.spieler.name}: ${t.buyins}×`);
  }

  async function schliesseSpielAb(){
    if(!confirmAction('Spiel wirklich abschließen? Alle Ergebnisse werden gespeichert.'))return;
    await db.from('spiele').update({abgeschlossen:true}).eq('id',aktuellesSpiel.id);
    aktuellesSpiel=null;spielTeilnehmer=[];await loadSpiel();await loadHome();
  }

    const aktuelleIds=new Set(spielTeilnehmer.map(t=>t.spieler_id));

    setSync('pending');
    for(const t of entf)await db.from('spiel_teilnehmer').delete().eq('id',t.id);
    if(hinzu.length>0)await db.from('spiel_teilnehmer').insert(hinzu.map(id=>({spiel_id:aktuellesSpiel.id,spieler_id:id,buyins:1,payout:0,leihgabe:0})));
    setSync('synced');
    document.getElementById('modal-teilnehmer-edit').classList.remove('open');

  document.getElementById('modal-auswahl-bestaetigen').addEventListener('click',async()=>{

  // ── SPIEL VERLAUF ──────────────────────────────────────
  async function loadVerlauf(){
    const el=document.getElementById('verlauf-content');
    el.innerHTML=`<div class="loading"><div class="spinner"></div>Wird geladen…</div>`;
    const{data:spiele}=await db.from('spiele').select('*,buyin_pot,spiel_teilnehmer(*,spieler(*))').eq('abgeschlossen',true).order('datum',{ascending:false}).limit(50);
    if(!spiele||spiele.length===0){el.innerHTML=`<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="empty-title">Noch keine Spiele</div><div class="empty-subtitle">Abgeschlossene Spiele erscheinen hier.</div></div>`;return;}
    let html='';
    spiele.forEach(spiel=>{
      const datum=new Date(spiel.datum).toLocaleDateString('de-AT',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
      const teilnehmer=spiel.spiel_teilnehmer||[];
      const bPot=spiel.buyin_pot??einstellungen.buyin_pot;
      const gesamtPot=teilnehmer.reduce((s,t)=>s+(t.buyins||0)*bPot,0);
      const gesamtPayout=teilnehmer.reduce((s,t)=>s+(t.payout||0),0);
      const sorted=[...teilnehmer].sort((a,b)=>{
        const ra=(a.payout||0)-(a.buyins||0)*bPot;
        const rb=(b.payout||0)-(b.buyins||0)*bPot;
        return rb-ra;
      });
      html+=`<div class="section-title">${datum}</div><div class="card">`;
      // Spiel-Header
      html+=`<div style="display:flex;gap:var(--space-sm);padding:var(--space-md);border-bottom:1px solid var(--border)">
        <div style="flex:1;text-align:center"><div class="stat-label">Spieler</div><div style="font-size:15px;font-weight:700;margin-top:4px">${teilnehmer.length}</div></div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="flex:1;text-align:center"><div class="stat-label">Pot</div><div style="font-size:15px;font-weight:700;margin-top:4px;color:var(--accent-text)">€${gesamtPot.toFixed(0)}</div></div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="flex:1;text-align:center"><div class="stat-label">Ausgespielt</div><div style="font-size:15px;font-weight:700;margin-top:4px">€${gesamtPayout.toFixed(2)}</div></div>
      </div>`;
      // Spieler-Ergebnisse
      sorted.forEach((t,i)=>{
        const rein=(t.payout||0)-(t.buyins||0)*bPot;
        const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
        html+=`<div class="list-item">
          ${avatarHtml(t.spieler,36)}
          <div class="item-body">
            <div class="item-title">${medal?medal+' ':''}${t.spieler?.name||'?'}</div>
            <div class="item-subtitle">${t.buyins||0}× BuyIn · PayOut €${(t.payout||0).toFixed(2)}</div>
          </div>
          <div class="item-trailing"><span class="item-amount ${ksClass(rein)}">${fmtSigned(rein)}</span></div>
        </div>`;
      });
      html+=`</div>`;
    });
    el.innerHTML=html;
  }

  // ── GESAMT STATISTIK ───────────────────────────────────
  async function loadStatistik(){
  async function loadStatistik(){
    el.innerHTML=`<div class="loading"><div class="spinner"></div>Wird geladen…</div>`;
    const[{data:spieler},{data:verlauf},{data:trans},{data:haende},{data:spieleData}]=await Promise.all([
      db.from('spieler').select('*').eq('aktiv',true).eq('ist_bank',false).order('name'),
      db.from('spiel_teilnehmer').select('*,spiele(abgeschlossen,buyin_pot)').eq('spiele.abgeschlossen',true),
      db.from('transaktionen').select('*'),
      db.from('hand_statistik').select('*'),
      db.from('spiele').select('id,buyin_pot').eq('abgeschlossen',true),
    ]);
    const spieleMap={};(spieleData||[]).forEach(s=>{spieleMap[s.id]=s;});

    if(!spieler||spieler.length===0){el.innerHTML=`<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="empty-title">Keine Daten</div></div>`;return;}

    const kontostaende=berechneKontostaende([...spieler,...alleSpieler.filter(s=>s.ist_bank)],trans,verlauf||[],spieleMap);

    const ranking=spieler.map(s=>{
      const abg=(verlauf||[]).filter(t=>t.spieler_id===s.id&&t.spiele?.abgeschlossen);
      const gBuyins=abg.reduce((x,t)=>x+(t.buyins||0),0);
      const gPayout=abg.reduce((x,t)=>x+(t.payout||0),0);
      const gRein=abg.reduce((x,t)=>{
        const bPot=t.spiele?.buyin_pot??einstellungen.buyin_pot;
        return x+(t.payout||0)-(t.buyins||0)*bPot;
      },0);
      const ks=kontostaende[s.id]||0;
      return{...s,abg:abg.length,gBuyins,gPayout,gRein,ks};
    }).sort((a,b)=>b.gRein-a.gRein);

    const totalSpiele=new Set((verlauf||[]).filter(t=>t.spiele?.abgeschlossen).map(t=>t.spiel_id)).size;
    const total7_2=(haende||[]).filter(h=>h.hand==='7-2').length;

    let html=`
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Spiele gesamt</div><div class="stat-value sm">${totalSpiele}</div></div>
        <div class="stat-card"><div class="stat-label">7-2 Gewinne</div><div class="stat-value sm">${total7_2}</div></div>
      </div>
      <div class="section-title">Rangliste (Reingewinn)</div>
      <div class="card">`;

    ranking.forEach((s,i)=>{
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
      html+=`<div class="list-item clickable" data-stats-id="${s.id}">
        <div style="width:28px;font-size:${i<3?'18':'14'}px;font-weight:700;text-align:center;flex-shrink:0">${medal}</div>
        ${avatarHtml(s,36)}
        <div class="item-body">
          <div class="item-title">${s.name}</div>
          <div class="item-subtitle">${s.abg} Spiele · Ø ${s.abg>0?fmtSigned(s.gRein/s.abg):'–'}</div>
        </div>
        <div class="item-trailing"><span class="item-amount ${ksClass(s.gRein)}">${fmtSigned(s.gRein)}</span>${chevron}</div>
      </div>`;
    });
    html+=`</div>

    <div class="section-title">Kontostand Ranking</div>
    <div class="card">`;
    [...ranking].sort((a,b)=>b.ks-a.ks).forEach((s,i)=>{
      html+=`<div class="list-item">
        <div style="width:28px;font-size:14px;font-weight:700;text-align:center;flex-shrink:0;color:var(--text-tertiary)">${i+1}.</div>
        ${avatarHtml(s,36)}
        <div class="item-body"><div class="item-title">${s.name}</div></div>
        <div class="item-trailing"><span class="item-amount ${ksClass(s.ks)}">${fmt(s.ks)}</span></div>
      </div>`;
    });
    html+=`</div>

    <div class="section-title">Besondere Hände</div>
    <div class="card">`;
    const handCounts={};
    (haende||[]).forEach(h=>{const sp=spieler.find(s=>s.id===h.gewinner_id);if(sp){handCounts[sp.id]=handCounts[sp.id]||{sp,total:0,sieben2:0};handCounts[sp.id].total++;if(h.hand==='7-2')handCounts[sp.id].sieben2++;}});
    const handArr=Object.values(handCounts).sort((a,b)=>b.total-a.total);
    if(handArr.length===0){html+=`<div class="list-item" style="color:var(--text-tertiary);justify-content:center">Noch keine besonderen Hände</div>`;}
    handArr.forEach(({sp,total,sieben2})=>{
      html+=`<div class="list-item">${avatarHtml(sp,36)}<div class="item-body"><div class="item-title">${sp.name}</div><div class="item-subtitle">${sieben2}× 7-2 Gewinn</div></div><div class="item-trailing"><span class="item-amount amount-pos">${total}×</span></div></div>`;
    });
    html+=`</div>`;

    el.innerHTML=html;

    // Klick auf Spieler → Spieler-Statistik
    el.querySelectorAll('.list-item.clickable[data-stats-id]').forEach(row=>{
      row.addEventListener('click',()=>{
        const s=ranking.find(x=>x.id===row.dataset.statsId);
        if(s)showSpielerStats({...s,_ks:s.ks});
      });
    });
  }

  // ── INIT ───────────────────────────────────────────────
  const{data:{session}}=await db.auth.getSession();
  if(session){currentUser=session.user;showApp();}
</script>
</body>
</html>
