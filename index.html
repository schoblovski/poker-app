<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Poker App 🃏</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; }
    #login-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; gap: 2rem; }
    .login-logo { font-size: 5rem; }
    .login-title { font-size: 2rem; font-weight: 700; color: #fff; }
    .login-subtitle { color: #aaa; font-size: 1rem; text-align: center; }
    .btn-google { display: flex; align-items: center; gap: 0.75rem; background: #fff; color: #333; border: none; border-radius: 12px; padding: 0.875rem 2rem; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; max-width: 320px; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    #app-screen { display: none; flex-direction: column; flex: 1; max-width: 480px; margin: 0 auto; width: 100%; }
    .header { background: #16213e; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; position: sticky; top: 0; z-index: 10; }
    .header-title { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .header-avatar { width: 36px; height: 36px; border-radius: 50%; background: #0f3460; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; overflow: hidden; }
    .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .content { flex: 1; overflow-y: auto; padding: 1rem; padding-bottom: 5rem; }
    .section-title { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin: 1rem 0 0.5rem; }
    .spieler-card { background: #16213e; border-radius: 12px; padding: 0.875rem 1rem; display: flex; align-items: center; gap: 0.875rem; margin-bottom: 0.5rem; }
    .spieler-avatar { width: 48px; height: 48px; border-radius: 50%; background: #0f3460; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0; }
    .spieler-info { flex: 1; }
    .spieler-name { font-weight: 600; font-size: 1rem; color: #fff; }
    .spieler-kontostand { font-weight: 700; font-size: 1rem; }
    .pos { color: #4ade80; } .neg { color: #f87171; } .nul { color: #888; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #16213e; border-top: 1px solid #0f3460; display: flex; z-index: 10; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.6rem 0.25rem; cursor: pointer; gap: 0.2rem; border: none; background: none; color: #666; }
    .nav-item.active { color: #4ade80; }
    .nav-icon { font-size: 1.3rem; } .nav-label { font-size: 0.65rem; font-weight: 500; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; color: #888; }
    .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #4ade80; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.75rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .page { display: none; } .page.active { display: block; }
    .placeholder { text-align: center; padding: 3rem 1rem; color: #666; }
    .placeholder .emoji { font-size: 3rem; margin-bottom: 1rem; }
    .user-menu { position: fixed; top: 60px; right: 1rem; background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 0.5rem; z-index: 100; display: none; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
    .user-menu.open { display: block; }
    .user-menu button { display: block; width: 100%; padding: 0.75rem 1rem; background: none; border: none; color: #f87171; cursor: pointer; font-size: 0.9rem; border-radius: 8px; text-align: left; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">🃏</div>
  <div class="login-title">Poker App</div>
  <div class="login-subtitle">Melde dich an um fortzufahren</div>
  <button class="btn-google" id="btn-login">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22" height="22" alt="G">
    Mit Google anmelden
  </button>
</div>

<div id="app-screen">
  <div class="header">
    <div class="header-title" id="page-title">🃏 Poker App</div>
    <div class="header-avatar" id="user-avatar">👤</div>
  </div>
  <div class="user-menu" id="user-menu">
    <button id="btn-logout">🚪 Abmelden</button>
  </div>
  <div class="content">
    <div class="page active" id="page-home">
      <div id="home-content"><div class="loading"><div class="spinner"></div>Lade...</div></div>
    </div>
    <div class="page" id="page-spiel"><div class="placeholder"><div class="emoji">🎮</div><p>Aktuelles Spiel kommt bald!</p></div></div>
    <div class="page" id="page-verlauf"><div class="placeholder"><div class="emoji">📋</div><p>Spiel Verlauf kommt bald!</p></div></div>
    <div class="page" id="page-statistik"><div class="placeholder"><div class="emoji">🏆</div><p>Hand Statistik kommt bald!</p></div></div>
    <div class="page" id="page-transaktionen"><div class="placeholder"><div class="emoji">💶</div><p>Transaktionen kommt bald!</p></div></div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-item" data-page="spiel"><span class="nav-icon">🎮</span><span class="nav-label">Akt. Spiel</span></button>
    <button class="nav-item" data-page="verlauf"><span class="nav-icon">📋</span><span class="nav-label">Verlauf</span></button>
    <button class="nav-item" data-page="statistik"><span class="nav-icon">🏆</span><span class="nav-label">Statistik</span></button>
    <button class="nav-item" data-page="transaktionen"><span class="nav-icon">💶</span><span class="nav-label">Transakt.</span></button>
  </nav>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://bcvyhlzjpfezokvcjksn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjdnlobHpqcGZlem9rdmNqa3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDAzNDksImV4cCI6MjA5MTMxNjM0OX0.DNvFp6N7HYjMwrimiKAd_D3VAQDYDns-2vvHOBdW4Yk';
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;

  const titles = { home: '🃏 Poker App', spiel: '🎮 Aktuelles Spiel', verlauf: '📋 Spiel Verlauf', statistik: '🏆 Hand Statistik', transaktionen: '💶 Transaktionen' };

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const page = btn.dataset.page;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      btn.classList.add('active');
      document.getElementById('page-title').textContent = titles[page];
    });
  });

  document.getElementById('user-avatar').addEventListener('click', () => {
    document.getElementById('user-menu').classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#user-menu') && !e.target.closest('#user-avatar')) {
      document.getElementById('user-menu').classList.remove('open');
    }
  });

  document.getElementById('btn-login').addEventListener('click', async () => {
    await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
  });

  document.getElementById('btn-logout').addEventListener('click', async () => {
    await db.auth.signOut();
  });

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    if (currentUser?.user_metadata?.avatar_url) {
      document.getElementById('user-avatar').innerHTML = `<img src="${currentUser.user_metadata.avatar_url}" alt="Avatar">`;
    }
    loadHome();
  }

  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }

  db.auth.onAuthStateChange((event, session) => {
    if (session) { currentUser = session.user; showApp(); }
    else { currentUser = null; showLogin(); }
  });

  async function loadHome() {
    const el = document.getElementById('home-content');
    const { data: spieler, error } = await db.from('spieler').select('*').eq('aktiv', true).order('name');
    if (error || !spieler) { el.innerHTML = `<div class="placeholder"><div class="emoji">⚠️</div><p>Fehler beim Laden.</p></div>`; return; }
    if (spieler.length === 0) { el.innerHTML = `<div class="placeholder"><div class="emoji">👥</div><p>Noch keine Spieler vorhanden.</p></div>`; return; }
    const ksClass = v => v > 0 ? 'pos' : v < 0 ? 'neg' : 'nul';
    let html = '';
    const ich = spieler.find(s => s.email === currentUser?.email);
    if (ich) {
      const ks = ich.kontostand || 0;
      html += `<div class="section-title">Ich</div><div class="spieler-card"><div class="spieler-avatar">👤</div><div class="spieler-info"><div class="spieler-name">${ich.name}</div></div><div class="spieler-kontostand ${ksClass(ks)}">€${ks.toFixed(2)}</div></div>`;
    }

    if (bank) {
      html += `<div class="section-title">Bank</div>
        <div class="spieler-card" style="background: #0f3460;">
          <div class="spieler-avatar">🏦</div>
          <div class="spieler-info"><div class="spieler-name">Bank</div></div>
          <div class="spieler-kontostand pos">€0.00</div>
        </div>`;
    }
    const bank = spieler.find(s => s.ist_bank);
    const rest = spieler.filter(s => s.email !== currentUser?.email && !s.ist_bank);
    html += `<div class="section-title">Alle Spieler</div>`;
    rest.forEach(s => {
      const ks = s.kontostand || 0;
      html += `<div class="spieler-card"><div class="spieler-avatar">👤</div><div class="spieler-info"><div class="spieler-name">${s.name}</div></div><div class="spieler-kontostand ${ksClass(ks)}">€${ks.toFixed(2)}</div></div>`;
    });
    el.innerHTML = html;
  }

  const { data: { session } } = await db.auth.getSession();
  if (session) { currentUser = session.user; showApp(); }
</script>
</body>
</html>
